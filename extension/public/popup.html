<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baseball Live Tracker</title>
    <link rel="stylesheet" href="./popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="popup">
      <section class="header">
        <h1>Baseball Live Tracker</h1>
        <p>KBO 실시간 경기 알림</p>
      </section>

      <section class="section">
        <label for="favorite-team" class="label">응원 팀</label>
        <select id="favorite-team" class="select">
          <option value="LG">LG 트윈스</option>
          <option value="DOO">두산 베어스</option>
          <option value="KIA">KIA 타이거즈</option>
          <option value="SAM">삼성 라이온즈</option>
          <option value="LOT">롯데 자이언츠</option>
          <option value="HAN">한화 이글스</option>
          <option value="SSG">SSG 랜더스</option>
          <option value="KT">KT 위즈</option>
          <option value="NC">NC 다이노스</option>
          <option value="KIW">키움 히어로즈</option>
        </select>
      </section>

      <section class="score-card">
        <div class="score-row">
          <span class="team">LG</span>
          <strong class="score">5</strong>
        </div>
        <div class="score-row">
          <span class="team">두산</span>
          <strong class="score">3</strong>
        </div>
      </section>

      <section class="game-status">
        <div>
          <span class="label">선택 팀</span>
          <strong id="selected-team">LG</strong>
        </div>
        <div>
          <span class="label">현재 이닝</span>
          <strong>7회초</strong>
        </div>
        <div>
          <span class="label">아웃카운트</span>
          <strong>1 Out</strong>
        </div>
      </section>

      <section class="section">
        <h2>최근 이벤트</h2>
        <ul class="event-list">
          <li>LG 7회초 1득점</li>
          <li>두산 투수 교체</li>
          <li>LG 주자 2루 진루</li>
        </ul>
      </section>

      <section class="connection">
        <span class="status-dot"></span>
        <span>WebSocket 연결 대기</span>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
